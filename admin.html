<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Admin Panel (Multiple)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 550px; background: white; padding: 30px; margin: 30px auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .token-section { background: #ffeeba; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; }
        #status-list { text-align: left; margin-top: 20px; max-height: 200px; overflow-y: auto; padding: 10px; background: #eee; border-radius: 5px; display: none; }
        .status-item { margin: 5px 0; font-size: 14px; font-weight: bold; }
        .loading { color: #ff9800; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Poster Admin Panel</h2>
    <p style="font-size: 13px; color: #666;">(ഒന്നിൽ കൂടുതൽ ചിത്രങ്ങൾ ഒരേസമയം അപ്‌ലോഡ് ചെയ്യാം)</p>
    
    <div id="tokenSection" class="token-section">
        <p style="color: #856404; font-size: 14px;">GitHub ടോക്കൺ ബ്രൗസറിൽ സേവ് ചെയ്തിട്ടില്ല. ദയവായി താഴെ നൽകുക:</p>
        <input type="password" id="githubToken" placeholder="Paste your GitHub Personal Access Token here">
        <button onclick="saveToken()">Save Token</button>
    </div>

    <div id="uploadSection">
        <input type="file" id="imageInput" accept="image/*" multiple>
        <button onclick="uploadMultipleToGithub()">🚀 Upload All Posters</button>
        <button onclick="clearToken()" style="background-color: #dc3545; font-size: 12px; padding: 5px; margin-top: 20px;">Change/Delete Token</button>
    </div>

    <div id="status-list"></div>
</div>

<script>
    // നിങ്ങളുടെ വിവരങ്ങൾ
    const GITHUB_USERNAME = "zain-zain22"; 
    const REPO_NAME = "poster";             
    const BRANCH = "main";                          
    const TOKEN_KEY = "poster_multiple_gh_token";

    window.onload = function() {
        if (!localStorage.getItem(TOKEN_KEY)) {
            document.getElementById('tokenSection').style.display = 'block';
        }
    }

    function saveToken() {
        const token = document.getElementById('githubToken').value.trim();
        if (token) {
            localStorage.setItem(TOKEN_KEY, token);
            document.getElementById('tokenSection').style.display = 'none';
            alert('ടോക്കൺ ബ്രൗസറിൽ വിജയകരമായി സേവ് ചെയ്തു!');
        } else {
            alert('ദയവായി ടോക്കൺ നൽകുക');
        }
    }

    function clearToken() {
        if(confirm("സേവ് ചെയ്ത ടോക്കൺ ഡിലീറ്റ് ചെയ്യണോ?")) {
            localStorage.removeItem(TOKEN_KEY);
            document.getElementById('tokenSection').style.display = 'block';
            document.getElementById('githubToken').value = '';
            alert('ടോക്കൺ ഡിലീറ്റ് ചെയ്തു.');
        }
    }

    // ഒന്നിലധികം ഫയലുകൾ ഓരോന്നായി അപ്‌ലോഡ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
    async function uploadMultipleToGithub() {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) {
            alert('ആദ്യം ടോക്കൺ സേവ് ചെയ്യുക!');
            document.getElementById('tokenSection').style.display = 'block';
            return;
        }

        const fileInput = document.getElementById('imageInput');
        const files = fileInput.files;

        if (files.length === 0) {
            alert('ദയവായി ഒന്നോ അതിലധികമോ ചിത്രങ്ങൾ സെലക്ട് ചെയ്യുക.');
            return;
        }

        const statusList = document.getElementById('status-list');
        statusList.innerHTML = ''; // പഴയ സ്റ്റാറ്റസ് ഒഴിവാക്കാൻ
        statusList.style.display = 'block';

        // ഓരോ ഫയലും ലൂപ്പ് ചെയ്ത് അപ്‌ലോഡ് ചെയ്യുന്നു
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            // ലിസ്റ്റിൽ താല്കാലികമായി പേര് കാണിക്കാൻ
            const itemTargetId = `item-${i}`;
            statusList.innerHTML += `<div class="status-item loading" id="${itemTargetId}">⏳ ${file.name} - Uploading...</div>`;
            
            try {
                await uploadSingleFile(file, token, itemTargetId);
            } catch (error) {
                document.getElementById(itemTargetId).className = "status-item error";
                document.getElementById(itemTargetId).innerText = `❌ ${file.name} - Failed: ${error.message}`;
            }
        }

        fileInput.value = ''; // അപ്‌ലോഡ് കഴിഞ്ഞാൽ ഇൻപുട്ട് ക്ലിയർ ചെയ്യാൻ
    }

    // ഒരൊറ്റ ഫയൽ അപ്‌ലോഡ് ചെയ്യാനുള്ള പ്രോമിസ് ഫങ്ക്ഷൻ
    function uploadSingleFile(file, token, elementId) {
        return new Promise((resolve, reject) => {
            const fileName = `poster_${Date.now()}_${Math.floor(Math.random() * 1000)}.${file.name.split('.').pop()}`;
            const path = `posters/${fileName}`; 

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64Content = reader.result.split(',')[1];
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${path}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Uploaded ${file.name} via Multi-Admin Panel`,
                            content: base64Content,
                            branch: BRANCH
                        })
                    });

                    if (response.ok) {
                        const statusItem = document.getElementById(elementId);
                        statusItem.className = "status-item success";
                        statusItem.innerText = `✅ ${file.name} - വിജയകരമായി അപ്‌ലോഡ് ചെയ്തു!`;
                        resolve();
                    } else {
                        const errData = await response.json();
                        reject(new Error(errData.message));
                    }
                } catch (error) {
                    reject(error);
                }
            };
            reader.onerror = () => reject(new Error("File reading failed"));
        });
    }
</script>

</body>
</html>
