<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projector Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* പ്രധാന പേജ് ഒരു ഫ്ലെക്സ് ബോക്സ് ആക്കുന്നു */
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* പോസ്റ്റർ മുകളിലും ബട്ടൺ താഴെയും വരാൻ */
        }

        /* പോസ്റ്റർ നിൽക്കുന്ന ഭാഗം - ബട്ടൺ ബാർ കഴിഞ്ഞ് ബാക്കി മുഴുവൻ സ്ഥലം എടുക്കും */
        .slider { 
            flex: 1;
            width: 100%; 
            position: relative;
            background-color: #000;
        }

        .poster { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* ബട്ടൺ അമർത്തുമ്പോൾ ഫേഡിംഗ് ഇല്ലാതെ പെട്ടെന്ന് മാറാൻ transition ഒഴിവാക്കി */
        .poster.active { 
            opacity: 1; 
        }

        .poster img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        /* ബട്ടണുകൾക്കായി താഴെ പ്രത്യേകം ഉണ്ടാക്കിയ ബാർ */
        .controls-bar { 
            width: 100%;
            background-color: #111; /* ബട്ടണുകൾക്ക് പിന്നിൽ ഒരു ഡാർക്ക് ബാക്ക്ഗ്രൗണ്ട് */
            padding: 15px; 
            display: flex; 
            justify-content: center; /* ബട്ടണുകൾ നടുവിലേക്ക് കൊണ്ടുവരാൻ */
            gap: 20px; 
            border-top: 1px solid #222;
        }

        .btn { 
            background-color: #333; 
            color: white; 
            border: 2px solid #555; 
            padding: 15px 35px; /* ബട്ടൺ ഞെക്കാൻ എളുപ്പത്തിന് വീതി കൂട്ടി */
            font-size: 20px; /* അക്ഷരങ്ങൾ കുറച്ചുകൂടി വലുതാക്കി */
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
        }

        .btn:hover { 
            background-color: white; 
            color: black; 
            border-color: white;
        }

        .fullscreen-btn { 
            background-color: #009688; 
            border-color: #00bfa5; 
        }

        .fullscreen-btn:hover { 
            background-color: #00bfa5; 
            color: white; 
        }

        #msg { color: white; text-align: center; margin-top: 20%; font-size: 24px; }
    </style>
</head>
<body>

    <div id="msg">പോസ്റ്ററുകൾ ലോഡ് ചെയ്യുന്നു...</div>
    <div class="slider" id="slider" style="display:none;"></div>

    <div class="controls-bar">
        <button class="btn" onclick="prevPoster()">◀ Previous</button>
        <button class="btn fullscreen-btn" onclick="toggleFullScreen()">🖥️ Full Screen</button>
        <button class="btn" onclick="nextPoster()">Next ▶</button>
    </div>

    <script>
        const GITHUB_USERNAME = "zain-zain22";
        const REPO_NAME = "poster";
        const BRANCH = "main";

        let currentIndex = 0;
        let posterElements = [];

        async function fetchPosters() {
            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/posters?ref=${BRANCH}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("No posters found or folder missing");
                const files = await response.json();
                
                const images = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
                
                if(images.length === 0) {
                    document.getElementById('msg').innerText = "ഫോൾഡറിൽ ചിത്രങ്ങൾ ഒന്നും തന്നെയില്ല!";
                    return;
                }

                const slider = document.getElementById('slider');
                document.getElementById('msg').style.display = 'none';
                slider.style.display = 'block';

                images.forEach((img, index) => {
                    const div = document.createElement('div');
                    div.className = `poster ${index === 0 ? 'active' : ''}`;
                    
                    const imgTag = document.createElement('img');
                    imgTag.src = `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/posters/${img.name}`;
                    imgTag.alt = `Poster ${index + 1}`;
                    
                    div.appendChild(imgTag);
                    slider.appendChild(div);
                });

                posterElements = document.querySelectorAll('.poster');

            } catch (error) {
                document.getElementById('msg').innerText = "Error loading posters: " + error.message;
            }
        }

        function nextPoster() {
            if(posterElements.length <= 1) return;
            posterElements[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % posterElements.length;
            posterElements[currentIndex].classList.add('active');
        }

        function prevPoster() {
            if(posterElements.length <= 1) return;
            posterElements[currentIndex].classList.remove('active');
            currentIndex = (currentIndex - 1 + posterElements.length) % posterElements.length;
            posterElements[currentIndex].classList.add('active');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        fetchPosters();
    </script>

</body>
</html>
